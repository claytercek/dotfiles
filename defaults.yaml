# In general, I prefer to keep things as close to the defaults as possible, but
# these are some exceptions.

NSGlobalDomain:

  # Disable press and hold character picker.
  ApplePressAndHoldEnabled: false

  # System Preferences > Keyboard > Key Repeat.
  KeyRepeat: 1

  # System Preferences > Keyboard > Delay Until Repeat.
  InitialKeyRepeat: 15


com.apple.desktopservices:
  # Disable .DS_Store files on network drives.
  DSDontWriteNetworkStores: true

  # Disable .DS_Store files on external drives.
  DSDontWriteUSBStores: true


com.apple.finder:

  # Finder > Preferences > Advanced > When performing a search > Search the
  # current folder.
  FXDefaultSearchScope: SCcf

  # Finder > View > Show view options > Group By > None.
  FXPreferredGroupBy: None

  # Finder > View > As List.
  FXPreferredViewStyle: Nlsv

  # Finder > Preferences > New Finder windows show > Home directory.
  NewWindowTarget: PfHm

  # Finder > Preferences > New Finder windows show > Home directory.
  NewWindowTargetPath: "file://${HOME}"


  # Finder > Preferences > Show these items on the desktop > Hard disks.
  ShowHardDrivesOnDesktop: false

  # Finder > View > Show Path Bar.
  ShowPathbar: true


com.apple.Safari:
  # Use substring search by default in Safari.
  FindOnPageMatchesWordStartsOnly: false


com.apple.TextEdit:
  # TextEdit > Preferences > New Document > Plain text.
  RichText: false


com.apple.SoftwareUpdate:
  # System Preferences > Software Update > Advanced... > Automatically check for
  # updates.
  AutomaticCheckEnabled: true

  # System Preferences > Software Update > Advanced... > Download new updates
  # when available.
  AutomaticDownload: true


org.m0k.transmission:

  # Use `~/Documents/Torrents` to store incomplete downloads
  UseIncompleteDownloadFolder: true
  IncompleteDownloadFolder: "${HOME}/Documents/Torrents"

  # Use `~/Downloads` to store completed downloads
  DownloadLocationConstant: true

  # Don’t prompt for confirmation before downloading
  DownloadAsk: false
  MagnetOpenAsk: false

  # Don’t prompt for confirmation before removing non-downloading active transfers
  CheckRemoveDownloading: true

  # Trash original torrent files
  DeleteOriginalTorrent: true

  # Hide the donate message
  WarningDonate: false
  # Hide the legal disclaimer
  WarningLegal: false

  # IP block list.
  # Source: https://giuliomac.wordpress.com/2014/02/19/best-blocklist-for-transmission/
  BlocklistNew: true
  BlocklistURL: "http://john.bitsurge.net/public/biglist.p2p.gz"
  BlocklistAutoUpdate: true

  # Randomize port on launch
  RandomPort: true


com.googlecode.iterm2:

  PrefsCustomFolder: "${HOME}/.config/iterm"